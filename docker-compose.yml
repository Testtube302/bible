version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bible}
      POSTGRES_USER: ${POSTGRES_USER:-bible_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # Internal only — no host port to avoid conflict with freddy-db on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bible_user} -d ${POSTGRES_DB:-bible}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: bible-chromadb
    restart: unless-stopped
    # Internal only — no host port needed
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Fastify Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bible-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=3002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-bible}
      - POSTGRES_USER=${POSTGRES_USER:-bible_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - LLM_PROVIDER=${LLM_PROVIDER:-kimi}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.moonshot.ai/v1}
      - LLM_MODEL=${LLM_MODEL:-kimi-k2.5}
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY is required}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.6}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:?ADMIN_SESSION_SECRET is required}
    ports:
      - "127.0.0.1:3002:3002"

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/bible/api
        - NEXT_PUBLIC_WS_URL=ws://${DOMAIN:-localhost}/bible/api/chat
        - NEXT_PUBLIC_BASE_PATH=/bible
    container_name: bible-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production

  # Bible Data Ingestion (run once with --profile ingest)
  ingest:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: bible-ingest
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-bible}
      - POSTGRES_USER=${POSTGRES_USER:-bible_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    profiles:
      - ingest

volumes:
  postgres_data:
  chroma_data:
