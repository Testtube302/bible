# ============================================
# Scripture Bible PWA - Apache Reverse Proxy
# ============================================
#
# Prerequisites:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers
#   sudo systemctl restart apache2
#
# Installation:
#   sudo cp bible.conf /etc/apache2/sites-available/
#   sudo a2ensite bible
#   sudo systemctl reload apache2
#
# Adjust ServerName and SSL paths to match your setup.

<VirtualHost *:443>
    # !! Change this to your domain !!
    ServerName yourdomain.com

    # SSL (assumed already configured)
    # SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem

    # ============================================
    # WebSocket upgrade for AI chat
    # Must come BEFORE regular proxy rules
    # ============================================
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/bible/api/chat(.*)$ ws://localhost:3001/api/chat$1 [P,L]

    # ============================================
    # Backend API
    # ============================================
    ProxyPass /bible/api http://localhost:3001/api
    ProxyPassReverse /bible/api http://localhost:3001/api

    # ============================================
    # Frontend (Next.js)
    # ============================================
    ProxyPass /bible http://localhost:3000/bible
    ProxyPassReverse /bible http://localhost:3000/bible

    # ============================================
    # Headers
    # ============================================
    ProxyPreserveHost On

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache: static assets (1 year, immutable)
    <LocationMatch "/bible/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Cache: artwork images (1 week)
    <LocationMatch "/bible/artwork/">
        Header set Cache-Control "public, max-age=604800"
    </LocationMatch>

    # No cache: API responses
    <Location /bible/api>
        Header set Cache-Control "no-store"
    </Location>
</VirtualHost>

# HTTP to HTTPS redirect
<VirtualHost *:80>
    ServerName yourdomain.com
    Redirect permanent / https://yourdomain.com/
</VirtualHost>
